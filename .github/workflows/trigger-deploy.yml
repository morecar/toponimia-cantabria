name: Update data hashes

on:
  push:
    paths: [toponyms.json, attestations.json, etymologies.json]

permissions:
  contents: write

jobs:
  update-hashes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute blob SHAs and update hash files
        run: |
          for file in toponyms attestations etymologies; do
            if git ls-tree HEAD ${file}.json | grep -q .; then
              HASH=$(git ls-tree HEAD ${file}.json | awk '{print substr($3,1,12)}')
              printf '{"hash":"%s"}\n' "$HASH" > ${file}-hash.json
              echo "${file} hash: $HASH"
            fi
          done

      - name: Commit hash files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add toponyms-hash.json attestations-hash.json etymologies-hash.json
          git diff --cached --quiet || git commit -m "chore: update data hash files"
          git push origin data
