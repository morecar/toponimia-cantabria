name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        env:
          PUBLIC_URL: /toponimia-cantabria
          REACT_APP_TOPONYMS_URL: https://raw.githubusercontent.com/morecar/toponimia-cantabria/data/toponyms.json
          REACT_APP_TOPONYMS_HASH_URL: https://raw.githubusercontent.com/morecar/toponimia-cantabria/data/toponyms-hash.json
          REACT_APP_ETYMOLOGIES_URL: https://raw.githubusercontent.com/morecar/toponimia-cantabria/data/etymologies.json
          REACT_APP_ETYMOLOGIES_HASH_URL: https://raw.githubusercontent.com/morecar/toponimia-cantabria/data/etymologies-hash.json
          REACT_APP_GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.REACT_APP_GOOGLE_OAUTH_CLIENT_ID }}
        run: yarn build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
